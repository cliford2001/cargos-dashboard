<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mis Finanzas</title>
<style>
  :root{
    --bg:#0b0f14; --card:#141b24; --line:#1f2a37; --txt:#e6edf3; --mut:#8b98a5;
    --in:#3fb950; --out:#f85149; --accent:#58a6ff;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f8fa; --card:#ffffff; --line:#e5e9ee; --txt:#1b2733; --mut:#5b6673;
      --in:#1a7f37; --out:#cf222e; --accent:#0969da; }
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.5;-webkit-font-smoothing:antialiased; font-weight:500; letter-spacing:0.01em; text-rendering:optimizeLegibility; font-feature-settings: 'kern', 'liga', 'clig', 'calt';
    font-size:16px; font-variation-settings: 'wght' 500;
    transition: background 0.3s, color 0.3s;
  }
  .wrap{max-width:760px;margin:0 auto;padding:24px 16px 60px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
  .brand{font-weight:700;font-size:1.6rem;letter-spacing:-.04em; line-height:1.2; font-variation-settings: 'wght' 600}
  .brand span{color:var(--accent); font-weight:800; letter-spacing:-.05em; display:inline-block; transform:scaleX(1.06); font-variation-settings: 'wght' 800}
  .period{font-size:.75rem;color:var(--mut); font-variation-settings: 'wght' 500; letter-spacing:0.05em}
  .hero{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:16px; transition: transform 0.2s ease, box-shadow 0.2s ease}
  .hero:hover{transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2)}
  .hero .lbl{font-size:.78rem;color:var(--mut);text-transform:uppercase;letter-spacing:.08em; font-variation-settings: 'wght' 500}
  .hero .big{font-size:3.4rem;font-weight:700;letter-spacing:-.05em;margin-top:8px; font-variation-settings: 'wght' 700; line-height:1.05}
  .hero .big.neg{color:var(--out)} .hero .big.pos{color:var(--in)}
  .io{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .io .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px; transition: transform 0.2s ease, background 0.2s ease}
  .io .box:hover{transform: translateY(-2px); background:color-mix(in srgb,var(--card) 12%,transparent)}
  .io .k{font-size:.75rem;color:var(--mut);display:flex;align-items:center;gap:6px; font-variation-settings: 'wght' 500}
  .io .dot{width:9px;height:9px;border-radius:50%}
  .io .in .dot{background:var(--in)} .io .out .dot{background:var(--out)}
  .io .v{font-size:1.7rem;font-weight:700;margin-top:6px; font-variation-settings: 'wght' 600; line-height:1.1}
  .io .in .v{color:var(--in)} .io .out .v{color:var(--out)}
  .daygrp{margin-top:22px}
  .dayhead{display:flex;justify-content:space-between;align-items:baseline;
    font-size:.82rem;color:var(--mut);padding:0 4px 6px;border-bottom:1px solid var(--line);margin-bottom:6px}
  .row{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid var(--line); transition: background 0.2s ease; font-variation-settings: 'wght' 500}
  .row:hover{background:color-mix(in srgb,var(--card) 10%,transparent)}
  .row:last-child{border-bottom:none}
  .ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
    font-size:1.05rem;flex:0 0 auto}
  .ico.in{background:color-mix(in srgb,var(--in) 18%,transparent);color:var(--in)} .ico.out{background:color-mix(in srgb,var(--out) 16%,transparent);color:var(--out)}
  .meta{flex:1;min-width:0; font-variation-settings: 'wght' 500}
  .dest{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; font-variation-settings: 'wght' 600}
  .sub{font-size:.74rem;color:var(--mut); font-variation-settings: 'wght' 400}
  .amt{font-weight:700;white-space:nowrap; font-variation-settings: 'wght' 700}
  .amt.in{color:var(--in)} .amt.out{color:var(--txt)}
  .badge{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent);
    padding:2px 7px;border-radius:999px;margin-left:6px}
  footer{margin-top:36px;text-align:center;font-size:.7rem;color:var(--mut); font-variation-settings: 'wght' 400}
  .empty{text-align:center;color:var(--mut);padding:40px 0}
  .loader{display:flex;justify-content:center;padding:40px 0;opacity:0;transition:opacity 0.3s}
  .loader.active{opacity:1}
  .loader span{width:8px;height:8px;border-radius:50%;background:var(--accent);margin:0 4px;animation:spinner 1.2s infinite linear;
    animation-delay:calc(0.2s * var(--i));
  }
  @keyframes spinner{
    0%{transform:rotate(0deg) scale(1)}
    50%{transform:rotate(180deg) scale(1.2)}
    100%{transform:rotate(360deg) scale(1)}
  }
</style>
<div class="wrap">
  <header>
    <div class="brand">
      <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" style="margin-right:12px; vertical-align: middle">
        <rect width="40" height="40" fill="#1e3a8a"/>
        <text x="20" y="26" font-family="Inter" font-size="16" font-weight="700" text-anchor="middle" fill="white">
          C
        </text>
      </svg>
      <span>MisFinanzas</span>
    </div>
    <div class="period" id="period">—</div>
  </header>

  <div class="hero">
    <div class="lbl">Balance del periodo</div>
    <div class="big" id="balance">$0</div>
  </div>

  <div class="io">
    <div class="box in"><div class="k"><span class="dot"></span>Entradas</div><div class="v" id="entradas">$0</div></div>
    <div class="box out"><div class="k"><span class="dot"></span>Salidas</div><div class="v" id="salidas">$0</div></div>
  </div>

  <div id="lista">
    <div class="loader" id="loader">
      <span style="--i:1"></span>
      <span style="--i:2"></span>
      <span style="--i:3"></span>
    </div>
  </div>

  <footer>Datos sanitizados (sin RUT ni cuentas) · actualizado <span id="upd">—</span></footer>
</div>
<script>
const fmt = n => (n<0?"-":"") + "$" + Math.abs(n).toLocaleString("es-CL");
const ICON = {compra:"🛒",transferencia:"↔",pago:"💳",giro:"🏧",sueldo:"💼",abono:"⬇",otro:"•"};

// mostrar loader
const loader = document.getElementById("loader");
loader.classList.add("active");

fetch("./data/cargos.json?t=" + Date.now())
  .then(r => r.json())
  .then(d => {
    loader.classList.remove("active");
    // compat: esquema viejo usaba 'cargos' (todo salida)
    let movs = d.movimientos || (d.cargos||[]).map(c => ({...c, direccion:c.direccion||"salida"}));
    movs.sort((a,b)=> (a.fecha+ (a.hora||"")).localeCompare(b.fecha+(b.hora||"")));

    // periodo salarial = desde el ultimo sueldo (es_sueldo) en adelante
    let idx = -1;
    for (let i=movs.length-1;i>=0;i--){ if(movs[i].es_sueldo){ idx=i; break; } }
    const periodo = idx>=0 ? movs.slice(idx) : movs;
    const desde = idx>=0 ? movs[idx].fecha : (movs[0]?.fecha || "");

    const ent = periodo.filter(m=>m.direccion=="entrada").reduce((s,m)=>s+m.monto,0);
    const sal = periodo.filter(m=>m.direccion=="salida").reduce((s,m)=>s+m.monto,0);
    const bal = ent - sal;

    document.getElementById("entradas").textContent = fmt(ent);
    document.getElementById("salidas").textContent = fmt(sal);
    const b = document.getElementById("balance");
    b.textContent = fmt(bal); b.className = "big " + (bal>=0?"pos":"neg");
    document.getElementById("period").textContent =
      idx>=0 ? ("Periodo salarial desde " + desde) : ("Todos los movimientos desde " + desde);
    document.getElementById("upd").textContent = (d.actualizado||"").slice(0,16).replace("T"," ");

    const cont = document.getElementById("lista");
    if(!periodo.length){ cont.innerHTML = '<div class="empty">Sin movimientos aún.</div>'; return; }

    // agrupa por dia, mas reciente primero
    const g = {};
    periodo.forEach(m => (g[m.fecha]=g[m.fecha]||[]).push(m));
    const dias = Object.keys(g).sort().reverse();
    cont.innerHTML = dias.map(f => {
      const items = g[f].slice().reverse();
      const net = items.reduce((s,m)=> s + (m.direccion=="entrada"?m.monto:-m.monto), 0);
      const rows = items.map(m => {
        const io = m.direccion=="entrada" ? "in":"out";
        const sign = m.direccion=="entrada" ? "+":"−";
        return `<div class="row">
          <div class="ico ${io}">${ICON[m.tipo]||ICON.otro}</div>
          <div class="meta">
            <div class="dest">${m.destino||"-"}${m.es_sueldo?'<span class="badge">sueldo</span>':''}</div>
            <div class="sub">${m.hora||""} · ${m.tipo||""}</div>
          </div>
          <div class="amt ${io}">${sign} ${fmt(m.monto).replace("$","$")}</div>
        </div>`;
      }).join("");
      return `<div class="daygrp">
        <div class="dayhead"><span>${f}</span><span>${fmt(net)}</span></div>
        ${rows}
      </div>`;
    }).join("");
  })
  .catch(e => {
    loader.classList.remove("active");
    document.getElementById("lista").innerHTML = '<div class="empty">No se pudieron cargar los datos.</div>';
  });
</script>
