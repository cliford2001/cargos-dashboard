<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mis Finanzas</title>
<style>
  :root{
    --bg:#0b0f14; --card:#141b24; --line:#1f2a37; --txt:#e6edf3; --mut:#8b98a5;
    --in:#3fb950; --out:#f85149; --accent:#58a6ff;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f8fa; --card:#ffffff; --line:#e5e9ee; --txt:#1b2733; --mut:#5b6673;
      --in:#1a7f37; --out:#cf222e; --accent:#0969da; }
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter', 'SF Pro Text', system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.7;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;
    font-weight:600;letter-spacing:-0.01em; font-size:1rem;
    --font-smooth: 1.05;
    font-feature-settings: 'kern', 'liga', 'dlig', 'calt';
  }
  /* Enhanced typography and visual hierarchy */
  h1{font-size:2.4rem; line-height:1.2; margin-bottom:18px; letter-spacing:-0.03em; font-weight:800; text-shadow:0 2px 4px rgba(0,0,0,0.25);}
  h2{font-size:1.6rem; line-height:1.35; margin-bottom:14px; letter-spacing:-0.02em; font-weight:700; text-shadow:0 1px 1.5px rgba(0,0,0,0.15);}
  h3{font-size:1.25rem; line-height:1.3; margin-bottom:10px; letter-spacing:-0.018em; text-shadow:0 1px 1.2px rgba(0,0,0,0.12);}
  h4{font-size:1.05rem; line-height:1.3; margin-bottom:8px; letter-spacing:-0.015em; text-shadow:0 1px 1.1px rgba(0,0,0,0.1);}

  .hero .big{font-size:3.2rem; font-weight:800; letter-spacing:-0.05em; line-height:1.15; margin-top:6px;}
  .io .v{font-size:1.8rem; font-weight:700; line-height:1.3; margin-top:8px;}
  .row .dest{font-size:1.05rem; font-weight:550; letter-spacing:-0.008em;}
  .row .sub{font-size:0.75rem; font-weight:450; letter-spacing:-0.005em;}
  .amt{font-size:1.15rem; font-weight:650; line-height:1.2;}
  h2{font-size:1.5rem; line-height:1.4; margin-bottom:12px; letter-spacing:-0.018em; font-weight:700; text-shadow:0 1px 1px rgba(0,0,0,0.1);}
  h3{font-size:1.15rem; line-height:1.4; margin-bottom:8px; letter-spacing:-0.015em; text-shadow:0 1px 1px rgba(0,0,0,0.1);}
  h4{font-size:1rem; line-height:1.4; margin-bottom:6px; letter-spacing:-0.015em; text-shadow:0 1px 1px rgba(0,0,0,0.1);}
  
  .hero .big{font-size:2.8rem; font-weight:800; letter-spacing:-0.04em; line-height:1.2;}
  .io .v{font-size:1.7rem; font-weight:700; line-height:1.3;}
  .row .dest{font-size:1rem; font-weight:500; letter-spacing:-0.01em;}
  .row .sub{font-size:0.7rem; font-weight:400; letter-spacing:-0.01em;}
  .amt{font-size:1.1rem; font-weight:600; line-height:1.2;}
  
  /* Responsive adjustments for mobile */
  @media (max-width: 480px) {
    body{font-size:0.9rem; line-height:1.6;}
    h1{font-size:1.6rem; line-height:1.3;}
    h2{font-size:1.2rem; line-height:1.4;}
    .hero .big{font-size:2.4rem;}
    .io .v{font-size:1.5rem;}
    .row .dest{font-size:0.95rem;}
    .row .sub{font-size:0.65rem;}
    .amt{font-size:1rem;}
  }
  
  /* Improved visual hierarchy with spacing and contrast */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:8px}
  .brand{font-weight:700;font-size:1.35rem;letter-spacing:-0.015em}
  .brand span{color:var(--accent);font-weight:800}
  .period{font-size:.85rem;color:var(--mut);font-weight:500}
  
  .hero{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:30px;margin-bottom:28px;transition:box-shadow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
  .hero:hover{box-shadow:0 10px 30px rgba(0,0,0,0.25);transform:translateY(-3px);}

  .io .box{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;transition:box-shadow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.4s ease;}
  .io .box:hover{box-shadow:0 8px 20px rgba(0,0,0,0.18);background:color-mix(in srgb,var(--card) 97%,transparent);}

  .row{display:flex;align-items:center;gap:14px;padding:14px 8px;border-bottom:1px solid var(--line);transition:background 0.35s ease, transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-radius 0.4s ease;}
  .row:hover{background:color-mix(in srgb,var(--card) 98%,transparent);transform:translateX(6px);border-radius:18px;}

  .ico{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:1.1rem;flex:0 0 auto;transition:transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.35s ease;}
  .ico:hover{transform:scale(1.1);}
  .hero .lbl{font-size:.8rem;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;opacity:0.9;}
  .hero .big{font-size:2.8rem;font-weight:800;letter-spacing:-0.04em;margin-top:4px;transition:color 0.3s ease;}
  .hero .big.neg{color:var(--out)} .hero .big.pos{color:var(--in)}
  
  .io{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px;transition:opacity 0.3s ease;}
  .io .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;transition:box-shadow 0.3s ease, background 0.3s ease;}
  .io .box:hover{box-shadow:0 6px 16px rgba(0,0,0,0.15);background:color-mix(in srgb,var(--card) 98%,transparent);}
  .io .k{font-size:.8rem;color:var(--mut);display:flex;align-items:center;gap:8px;transition:color 0.3s ease;}
  .io .k:hover{color:var(--accent);}
  .io .dot{width:10px;height:10px;border-radius:50%;transition:background 0.3s ease;}
  .io .in .dot{background:var(--in)} .io .out .dot{background:var(--out)}
  .io .v{font-size:1.7rem;font-weight:700;margin-top:6px;transition:color 0.3s ease;}
  .io .in .v{color:var(--in)} .io .out .v{color:var(--out)}
  
  /* Enhanced micro-interactions and transitions */
  .row{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid var(--line);transition:background 0.3s ease, transform 0.3s ease, border-radius 0.3s ease;}
  .row:hover{background:color-mix(in srgb,var(--card) 98%,transparent);transform:translateX(4px);border-radius:16px;}
  
  /* Smooth fade-in for empty state */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;color:var(--mut);text-align:center;transition:opacity 0.3s ease, transform 0.3s ease;}
  .empty svg{width:48px;height:48px;margin-bottom:16px;opacity:0.6;}
  .empty h3{font-size:1.1rem;letter-spacing:-0.01em;margin-bottom:8px;}
  .empty p{font-size:0.85rem;opacity:0.8;}
  
  /* Day group styling with subtle lift */
  .daygrp{margin-top:28px}
  .dayhead{display:flex;justify-content:space-between;align-items:baseline;
    font-size:.85rem;color:var(--mut);padding:0 4px 8px;border-bottom:1px solid var(--line);margin-bottom:8px}
  
  .ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
    font-size:1.05rem;flex:0 0 auto;transition:transform 0.3s ease, background 0.3s ease;}
  .ico.in{background:color-mix(in srgb,var(--in) 18%,transparent);color:var(--in)}
  .ico.out{background:color-mix(in srgb,var(--out) 16%,transparent);color:var(--out)}
  .ico:hover{transform:scale(1.08);}
  
  .meta{flex:1;min-width:0}
  .dest{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sub{font-size:.76rem;color:var(--mut)}
  .amt{font-weight:700;white-space:nowrap}
  .amt.in{color:var(--in)} .amt.out{color:var(--txt)}
  .badge{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent);
    padding:2px 7px;border-radius:999px;margin-left:6px}
  footer{margin-top:36px;text-align:center;font-size:.72rem;color:var(--mut)}

  /* New: refined typography and hierarchy */
  h1{font-size:2.8rem; letter-spacing:-0.05em; line-height:1.15; font-weight:800; text-shadow:0 2px 4px rgba(0,0,0,0.3);}
  h2{font-size:1.8rem; letter-spacing:-0.03em; line-height:1.3; font-weight:700; text-shadow:0 1px 2px rgba(0,0,0,0.2);}
  h3{font-size:1.4rem; letter-spacing:-0.025em; line-height:1.3; font-weight:700; text-shadow:0 1px 1.5px rgba(0,0,0,0.15);}
  h4{font-size:1.2rem; letter-spacing:-0.015em; line-height:1.3; font-weight:600; text-shadow:0 1px 1.2px rgba(0,0,0,0.1);}
  
  /* Enhanced: improved font rendering with OpenType features */
  body{font-feature-settings: 'kern', 'liga', 'dlig', 'calt';}
  .hero .big{font-weight:800;}
  .io .v{font-weight:750;}
  .dest{font-weight:600;}
  .amt{font-weight:700;}
  
  /* Smooth typographic transitions */
  h1, h2, h3, h4, .big, .v, .dest, .amt{transition:font-weight 0.3s ease, color 0.3s ease;}
  h1:hover, h2:hover, h3:hover, h4:hover, .big:hover, .v:hover, .dest:hover, .amt:hover{font-weight:800;}
  
  .hero .big{font-size:3.6rem; letter-spacing:-0.07em; line-height:1.1; text-shadow:0 4px 8px rgba(0,0,0,0.3);}
  .io .v{font-size:2.1rem; letter-spacing:-0.015em; line-height:1.2; text-shadow:0 1px 2px rgba(0,0,0,0.2);}
  .row .dest{font-size:1.2rem; font-weight:650; letter-spacing:-0.015em; text-shadow:0 1px 1.2px rgba(0,0,0,0.15);}
  .row .sub{font-size:0.85rem; font-weight:500; letter-spacing:-0.01em; text-shadow:0 1px 1.1px rgba(0,0,0,0.1);}
  .amt{font-size:1.3rem; font-weight:750; line-height:1.2; text-shadow:0 1px 1.5px rgba(0,0,0,0.15);}
  
  /* Mobile refinement */
  @media (max-width: 480px) {
    h1{font-size:1.8rem;}
    h2{font-size:1.3rem;}
    .hero .big{font-size:2.6rem;}
    .io .v{font-size:1.6rem;}
    .row .dest{font-size:1rem;}
    .row .sub{font-size:0.7rem;}
    .amt{font-size:1.1rem;}
  }
  
  /* Added: subtle vertical spacing and contrast */
  .hero{padding:40px; box-shadow:0 16px 48px rgba(0,0,0,0.35);}
  .io{gap:20px; margin-bottom:32px;}
  .io .box{padding:28px;}
  .row{padding:16px 10px;}
  .dayhead{font-size:.9rem; padding:0 6px 10px;}
  .ico{width:44px; height:44px; font-size:1.15rem;}
  .ico.in{background:color-mix(in srgb,var(--in) 20%,transparent);}
  .ico.out{background:color-mix(in srgb,var(--out) 18%,transparent);}
  
  /* Improved contrast for readability */
  body{letter-spacing:-0.015em; line-height:1.7;}
  .hero .big{font-weight:800;}
  .io .v{font-weight:750;}
  .dest{font-weight:600;}
  .amt{font-weight:700;}
  
  /* Final polish: soft shadow and spacing for premium feel */
  .hero{box-shadow:0 12px 36px rgba(0,0,0,0.3);}
  .io .box{box-shadow:0 12px 36px rgba(0,0,0,0.2); transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
  .row{border-radius:16px; transition:all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
</style>
<div class="wrap">
  <header>
    <div class="brand">
      <svg viewBox="0 0 120 40" width="100" height="30" style="vertical-align: middle; margin-right: 8px;">
        <use href="#logo" />
      </svg>
      <div>
        <h1>Mis Finanzas</h1>
        <p class="tagline">Gestiona tu dinero con inteligencia</p>
      </div>
    </div>
    <div class="period" id="period">—</div>
  </header>

  <div class="hero">
    <div class="lbl">Balance del periodo</div>
    <div class="big" id="balance">$0</div>
  </div>

  <div class="io">
    <div class="box in"><div class="k"><span class="dot"></span>Entradas</div><div class="v" id="entradas">$0</div></div>
    <div class="box out"><div class="k"><span class="dot"></span>Salidas</div><div class="v" id="salidas">$0</div></div>
  </div>

  <div id="lista"></div>

  <footer>Datos sanitizados (sin RUT ni cuentas) · actualizado <span id="upd">—</span></footer>
</div>
<script>
const fmt = n => (n<0?"-":"") + "$" + Math.abs(n).toLocaleString("es-CL");
const ICON = {compra:"🛒",transferencia:"↔",pago:"💳",giro:"🏧",sueldo:"💼",abono:"⬇",inversion:"📈",otro:"•"};

fetch("./data/cargos.json?t=" + Date.now())
  .then(r => r.json())
  .then(d => {
    // compat: esquema viejo usaba 'cargos' (todo salida)
    let movs = d.movimientos || (d.cargos||[]).map(c => ({...c, direccion:c.direccion||"salida"}));
    movs.sort((a,b)=> (a.fecha+ (a.hora||""))
  })
  .catch(e => {
    document.getElementById("lista").innerHTML = '<div class="empty">No se pudieron cargar los datos.</div>';
  });
</script>
