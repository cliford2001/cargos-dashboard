<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mis Gastos · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0f19; --panel:#141a29; --panel2:#1b2334; --line:#26304a;
    --txt:#e8ecf5; --muted:#8b97b3; --accent:#5b8cff; --accent2:#22c98f;
    --danger:#ff6b6b; --radius:16px;
    --font-heading:'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-body:'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    --text-light: #f1f4f9;
    --text-dark: #333;
    --shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0f19;
      --panel: #141a29;
      --panel2: #1b2334;
      --line: #26304a;
      --txt: #e8ecf5;
      --muted: #8b97b3;
      --accent: #5b8cff;
      --accent2: #22c98f;
      --danger: #ff6b6b;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
  }
  
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel2: #f1f4f9;
      --line: #e0e4eb;
      --txt: #333;
      --muted: #7d88a1;
      --accent: #5b8cff;
      --accent2: #22c98f;
      --danger: #d64a4a;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: radial-gradient(1200px 600px at 70% -10%, #1a2540 0%, var(--bg) 55%);
    color: var(--txt);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 32px 20px;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  
  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 12px;
  }
  
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
  }
  
  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    color: var(--txt);
    margin-bottom: 4px;
    font-family: var(--font-heading);
    transition: font-weight 0.2s ease;
  }
  
  h1:hover {
    font-weight: 800;
  }
  
  .sub {
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 500;
    line-height: 1.4;
    font-family: var(--font-body);
  }
  
  .hero {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
  }
  
  .hero .label {
    color: var(--muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    font-family: var(--font-body);
  }
  
  .hero .big {
    font-size: 3rem;
    font-weight: 800;
    margin-top: 6px;
    color: var(--accent2);
    line-height: 1.2;
    font-family: var(--font-heading);
    transition: color 0.3s ease, transform 0.3s ease;
  }
  
  .hero:hover .big {
    color: #33d9a3;
    transform: translateY(-2px);
  }
  
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  
  .stat {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    transition: all 0.2s ease;
  }
  
  .stat:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
  }
  
  .stat .n {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--txt);
    font-family: var(--font-heading);
  }
  
  .stat .l {
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 4px;
    font-weight: 500;
    font-family: var(--font-body);
  }
  
  .day {
    margin-bottom: 20px;
    background: var(--panel);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
  }
  
  .day h2 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    background: var(--panel2);
    padding: 12px 14px;
    font-family: var(--font-heading);
  }
  
  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 8px;
    transition: all 0.2s ease;
  }
  
  .row:hover {
    background: var(--panel2);
    transform: translateX(4px);
  }
  
  .row .ico {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    background: var(--panel2);
    font-size: 1.1rem;
    flex: 0 0 auto;
    transition: all 0.2s ease;
  }
  
  .row:hover .ico {
    background: var(--accent2);
    color: white;
    transform: scale(1.1);
  }
  
  .row .info {
    flex: 1;
    min-width: 0;
  }
  
  .row .dest {
    font-weight: 600;
    color: var(--txt);
    font-size: 0.95rem;
    font-family: var(--font-heading);
  }
  
  .row .meta {
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 2px;
    font-weight: 400;
    font-family: var(--font-body);
  }
  
  .row .amt {
    font-weight: 700;
    font-size: 1.05rem;
    white-space: nowrap;
    color: var(--accent2);
    font-family: var(--font-heading);
  }
  
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 32px;
    line-height: 1.6;
    font-weight: 400;
    font-family: var(--font-body);
  }
  
  .pill {
    display: inline-block;
    background: var(--panel2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 500;
    font-family: var(--font-body);
  }
  
  /* Responsive adjustments */
  @media (max-width: 480px) {
    body { padding: 20px 12px; }
    .wrap { padding: 0; }
    h1 { font-size: 1.6rem; }
    .hero .big { font-size: 2.4rem; }
    .stat { padding: 14px; }
    .row { padding: 10px 12px; }
    .row .ico { width: 32px; height: 32px; }
    .row .dest { font-size: 0.9rem; }
  }
  
  /* Fallback for missing Inter font */
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 400;
    src: local('Inter'), local('Inter Regular'), 'https://fonts.gstatic.com/s/inter/v12/UcC73zUu0000000IalCFOQ.woff2' format('woff2');
  }
  
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 700;
    src: local('Inter Bold'), local('Inter-Bold'), 'https://fonts.gstatic.com/s/inter/v12/UcC73zUu0000000IalCFOQ.woff2' format('woff2');
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="title">Mis Gastos</h1>
      <div class="sub">Actualizado automáticamente · <span id="updated">—</span></div>
    </div>
    <span class="pill">🤖 auto · Raspberry Pi + qwen3</span>
  </header>

  <div class="hero">
    <div class="label">Total registrado</div>
    <div class="big" id="grandTotal">—</div>
  </div>

  <div class="grid" id="stats"></div>

  <div id="days"></div>

  <footer>
    Generado y actualizado de forma autónoma desde correos bancarios.<br>
    Datos sanitizados (sin RUT ni números de cuenta).
  </footer>
</div>

<script>
const fmt = n => "$" + n.toLocaleString("es-CL");
const ICON = {transferencia:"↗", compra:"🛒", pago:"💳", giro:"🏧", otro:"•"};

fetch("./data/cargos.json?t=" + Date.now())
  .then(r => r.json())
  .then(d => {
    document.getElementById("title").textContent = d.titulo || "Mis Gastos";
    document.getElementById("updated").textContent =
      new Date(d.actualizado).toLocaleString("es-CL");
    const cargos = d.cargos || [];
    const total = cargos.reduce((s,c)=>s+(c.monto||0),0);
    document.getElementById("grandTotal").textContent = fmt(total);

    // stats
    const byType = {};
    cargos.forEach(c => byType[c.tipo]=(byType[c.tipo]||0)+c.monto);
    const stats = document.getElementById("stats");
    stats.innerHTML =
      `<div class="stat"><div class="n">${cargos.length}</div><div class="l">Movimientos</div></div>` +
      `<div class="stat"><div class="n">${Object.keys(groupBy(cargos)).length}</div><div class="l">Días</div></div>` +
      Object.entries(byType).map(([t,v])=>
        `<div class="stat"><div class="n">${fmt(v)}</div><div class="l">${t}</div></div>`).join("");

    // por día
    const groups = groupBy(cargos);
    const days = document.getElementById("days");
    days.innerHTML = Object.keys(groups).sort().reverse().map(fecha => {
      const items = groups[fecha];
      const dTotal = items.reduce((s,c)=>s+c.monto,0);
      return `<div class="day"><h2><span>${fecha}</span><span>${fmt(dTotal)}</span></h2>` +
        items.map(c=>`
          <div class="row">
            <div class="ico">${ICON[c.tipo]||"•"}</div>
            <div class="info">
              <div class="dest">${c.destino||"--"}</div>
              <div class="meta">${c.hora||""} · ${c.tipo}</div>
            </div>
            <div class="amt">${fmt(c.monto)}</div>
          </div>`).join("") + `</div>`;
    }).join("");
  })
  .catch(e => {
    document.getElementById("grandTotal").textContent = "error";
    console.error(e);
  });

function groupBy(cargos){
  const g={};
  cargos.forEach(c=>{(g[c.fecha]=g[c.fecha]||[]).push(c)});
  return g;
}
</script>
</body>
</html>
